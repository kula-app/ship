name: Build Binaries

on:
  workflow_call:
    inputs:
      version:
        description: "Version string to embed"
        required: true
        type: string
      commit_sha:
        description: "Commit SHA to embed"
        required: true
        type: string
      build_date:
        description: "Build date to embed"
        required: true
        type: string
    secrets:
      DEVELOPER_ID_P12_BASE64:
        description: "Base64-encoded Developer ID Application certificate (.p12), including chain"
        required: false
      DEVELOPER_ID_PASSWORD:
        description: "Password for the Developer ID certificate"
        required: false
      APPLE_NOTARIZATION_APP_STORE_CONNECT_API_KEY_P8_BASE64:
        description: "Base64-encoded App Store Connect API key (.p8 PEM file) used for notarization"
        required: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - platform: linux-amd64
            goos: linux
            goarch: amd64
          - platform: linux-arm64
            goos: linux
            goarch: arm64
          - platform: darwin-amd64
            goos: darwin
            goarch: amd64
          - platform: darwin-arm64
            goos: darwin
            goarch: arm64
          - platform: windows-amd64
            goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        run: |
          BINARY="ship-${{ matrix.platform }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-s -w -extldflags '-static' \
                      -X main.version=${{ inputs.version }} \
                      -X main.commit=${{ inputs.commit_sha }} \
                      -X main.date=${{ inputs.build_date }} \
                      -X main.environment=production" \
            -o "dist/${BINARY}" \
            ./cmd/cli

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.platform }}
          path: dist/ship-*
          if-no-files-found: error
          retention-days: 1

  sign-and-notarize-darwin:
    name: Sign and Notarize macOS Binaries
    # Only sign on non-fork pushes where secrets are available
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: kula/rcodesign:alpine
    steps:
      - name: Download Darwin CLI artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: cli-darwin-*
          merge-multiple: true

      - name: Write signing material
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
          API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARIZATION_APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ vars.APPLE_NOTARIZATION_APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ vars.APPLE_NOTARIZATION_APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -eu
          umask 077
          printf '%s' "$DEVELOPER_ID_P12_BASE64" | base64 -d > cert.p12
          printf '%s' "$DEVELOPER_ID_PASSWORD" > cert.pw
          printf '%s' "$API_KEY_P8_BASE64" | base64 -d > api_key.p8
          rcodesign encode-app-store-connect-api-key \
            -o api_key.json \
            "$API_ISSUER_ID" "$API_KEY_ID" api_key.p8
          rm api_key.p8

      - name: Sign and notarize CLI darwin-arm64
        run: |
          set -eu
          cd dist

          rcodesign sign \
            --p12-file ../cert.p12 \
            --p12-password-file ../cert.pw \
            --code-signature-flags runtime \
            ship-darwin-arm64

          rcodesign verify ship-darwin-arm64

          zip -q ship-darwin-arm64.zip ship-darwin-arm64
          rcodesign notary-submit \
            --api-key-file ../api_key.json \
            --wait \
            ship-darwin-arm64.zip
          rm ship-darwin-arm64.zip

      - name: Sign and notarize CLI darwin-amd64
        run: |
          set -eu
          cd dist

          rcodesign sign \
            --p12-file ../cert.p12 \
            --p12-password-file ../cert.pw \
            --code-signature-flags runtime \
            ship-darwin-amd64

          rcodesign verify ship-darwin-amd64

          zip -q ship-darwin-amd64.zip ship-darwin-amd64
          rcodesign notary-submit \
            --api-key-file ../api_key.json \
            --wait \
            ship-darwin-amd64.zip
          rm ship-darwin-amd64.zip

      - name: Upload signed CLI darwin-arm64
        uses: actions/upload-artifact@v7
        with:
          name: cli-darwin-arm64
          path: dist/ship-darwin-arm64
          retention-days: 1
          overwrite: true

      - name: Upload signed CLI darwin-amd64
        uses: actions/upload-artifact@v7
        with:
          name: cli-darwin-amd64
          path: dist/ship-darwin-amd64
          retention-days: 1
          overwrite: true

      - name: Cleanup signing material
        if: always()
        continue-on-error: true
        run: rm -f cert.p12 cert.pw api_key.p8 api_key.json
